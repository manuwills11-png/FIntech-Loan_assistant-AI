services:
  - type: web
    name: finedge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    startCommand: python start.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-groq-70b-8192-tool-use-preview
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MODEL_PATH
        value: ./ml/loan_risk_model.pkl
      - key: SCHEDULER_TIMEZONE
        value: Asia/Kolkata
      - key: APP_ENV
        value: production
